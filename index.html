<!DOCTYPE html>
<html lang="pt-BR" class="h-full bg-slate-950 text-slate-100">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lava Jato Storm - Sistema de Gerenciamento de Lava-Jato</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0f3ff',
              100: '#e1e7ff',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts (Outfit) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* Estilos personalizados para transições e rolagem */
    .view-section {
      transition: opacity 0.2s ease-in-out;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #0f172a;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
    /* Efeito Glassmorphism para cards */
    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body class="h-full flex overflow-hidden custom-scrollbar">

      <!-- Navigation -->
      <nav class="flex-1 px-4 py-6 space-y-1.5 overflow-y-auto custom-scrollbar">

        <button onclick="switchView('vehicles')" id="nav-vehicles" class="nav-btn w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200 text-slate-400 hover:bg-slate-800 hover:text-slate-100">

          <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />

          <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

      <!-- Sidebar Footer Info -->
      <div class="p-4 bg-slate-950 border-t border-slate-800 text-xs text-slate-500">
        <p class="font-medium text-slate-400">Lava Jato Storm v1.0.0</p>
        <p>Dados salvos localmente</p>
      </div>
    </div>
  </aside>

  <!-- MOBILE HEADER AND LAYOUT CONTAINER -->
  <div class="md:pl-64 flex flex-col flex-1 w-full h-full overflow-hidden">
    
    <!-- TOP BAR -->
    <header class="flex items-center justify-between h-16 px-6 bg-slate-900 border-b border-slate-800 flex-shrink-0 z-10">
      
      <!-- Hamburger Menu for Mobile -->
      <div class="flex items-center md:hidden">
        <button id="mobile-menu-btn" class="text-slate-400 hover:text-white focus:outline-none">

            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />

        <span class="ml-3 text-lg font-bold bg-gradient-to-r from-brand-500 to-violet-400 bg-clip-text text-transparent">Lava Jato Storm</span>

        <h1 id="page-title" class="text-xl font-bold text-slate-100">Painel Inicial</h1>
        <p id="page-subtitle" class="text-xs text-slate-400">Visão geral do dia de hoje</p>
      </div>

      <!-- Right Quick Actions -->
      <div class="flex items-center space-x-3">

        <div id="header-stock-alert" class="hidden flex items-center px-3 py-1.5 rounded-full bg-rose-500/10 text-rose-400 border border-rose-500/20 text-xs font-semibold animate-pulse">
          <span class="w-1.5 h-1.5 rounded-full bg-rose-500 mr-2"></span>
          Estoque Crítico!
        </div>

        <button onclick="openCarModal()" class="flex items-center px-3.5 py-2 text-xs font-semibold bg-brand-600 hover:bg-brand-700 text-white rounded-lg transition shadow-lg shadow-brand-500/10">
          <svg class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
          Adicionar Carro
        </button>

        <button onclick="openCashModal()" class="hidden md:flex items-center px-3.5 py-2 text-xs font-semibold bg-slate-800 hover:bg-slate-700 border border-slate
